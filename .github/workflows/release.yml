name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check version change
        id: check_version
        run: |
          NEW_VERSION=$(jq -r .version package.json)
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          OLD_VERSION=${LATEST_TAG#v}
          
          echo "Current package.json version: $NEW_VERSION"
          echo "Last release tag version: $OLD_VERSION"
          
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Run linter
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run lint --if-present

      # --- DÉBUT DE L'ARCHITECTURE DE TESTS ---

      - name: Run Unit Tests (Vitest)
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run test:unit

      - name: Compile Integration Tests
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run compile-tests

      - name: Install xvfb (Virtual Display for VS Code)
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Run Integration Tests (VS Code CLI)
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        # xvfb-run permet de lancer le processus dans l'écran virtuel invisible
        run: xvfb-run -a npm run test:integration

      # --- FIN DE L'ARCHITECTURE DE TESTS ---

      - name: Build production bundle
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm run package

      - name: Package extension (.vsix)
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npx @vscode/vsce package -o backseat-pilot-${{ steps.check_version.outputs.version }}.vsix

      - name: Create GitHub Release
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          TAG="v$VERSION"
          
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md
          
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $TAG" > RELEASE_NOTES.md
          fi
          
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file RELEASE_NOTES.md \
            backseat-pilot-$VERSION.vsix

      - name: Publish to Microsoft VS Code Marketplace
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --pat $VSCE_PAT

      - name: Publish to Open VSX Registry
        if: steps.check_version.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish backseat-pilot-${{ steps.check_version.outputs.version }}.vsix --pat $OVSX_PAT