name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Check version change
        id: check_version
        run: |
          # Get version from the current package.json
          NEW_VERSION=$(jq -r .version package.json)
          
          # Find the latest tag. If no tags exist yet (first run), default to empty string.
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # Remove the 'v' prefix from the tag for a clean comparison (e.g., 'v1.0.0' becomes '1.0.0')
          OLD_VERSION=${LATEST_TAG#v}
          
          echo "Current package.json version: $NEW_VERSION"
          echo "Last release tag version: $OLD_VERSION"
          
          if [ "$NEW_VERSION" != "$OLD_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        if: steps.check_version.outputs.changed == 'true'
        run: npm ci

      - name: Build production bundle
        if: steps.check_version.outputs.changed == 'true'
        run: npm run package

      - name: Package extension (.vsix)
        if: steps.check_version.outputs.changed == 'true'
        run: npx @vscode/vsce package -o backseat-pilot-${{ steps.check_version.outputs.version }}.vsix

      - name: Create GitHub Release
        if: steps.check_version.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.check_version.outputs.version }}"
          TAG="v$VERSION"
          
          # Extract the latest entry from CHANGELOG.md
          sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '$d' > RELEASE_NOTES.md
          
          # Fallback if changelog parsing fails or is empty
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $TAG" > RELEASE_NOTES.md
          fi
          
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file RELEASE_NOTES.md \
            backseat-pilot-$VERSION.vsix